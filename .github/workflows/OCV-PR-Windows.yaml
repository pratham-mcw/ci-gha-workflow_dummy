name: OCV PR Windows

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/OCV-PR-Windows.yaml'
      - 'checkout-and-merge/*'
      - 'configure-and-build/*'
      - 'run-tests/*'
      - 'scripts/runner.py'
      - 'scripts/test-plan.json'
  workflow_call:
    inputs:
      workflow_branch:
        description: "Branch for ci-gha-workflow repository"
        default: "main"
        required: false
        type: string

concurrency:
  group: OCV-PR-Windows-${{ github.ref }}
  cancel-in-progress: true

jobs:

  branch_eval:
    runs-on: ubuntu-24.04
    outputs:
      branches: ${{ steps.determine-branches.outputs.branches }}
    steps:
        - id: determine-branches
          shell: bash
          run: |
            echo "branches=[ '4.x' ]" >> "$GITHUB_OUTPUT"

  Windows:
    runs-on: self-hosted
    needs:
      - branch_eval
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        arch: [ arm64 ]
        config: [ base ]
        include:
          - arch: arm64
            config: base
            vs: 'Visual Studio 17 2022'
            cmake_arch: ARM64
            no_opencl: true

        branch: ${{ fromJSON(needs.branch_eval.outputs.branches )}}
    defaults:
      run:
        shell: bash
    env:
      CMAKE_OPT: >-
        -DCL_Z_OPTION=/Z7
        -DBUILD_EXAMPLES=ON
        -DOPENCV_ENABLE_NONFREE=ON
        -DCMAKE_BUILD_TYPE=Release
        ${{ matrix.no_opencl && '-DWITH_OPENCL=OFF' || '' }}
        ${{ matrix.arch == 'x86' && '-DBUILD_opencv_python3=OFF' || '' }}
      MAIN_BUILD_DIR: "${{ (github.event.repository.name != 'opencv_contrib') && 'build' || 'build-contrib' }}"
      OPENCV_FOR_THREADS_NUM: 8
      CMAKE_BUILD_PARALLEL_LEVEL: 8

    steps:

    - name: Propagate environment
      run: |
        echo "GIT_CACHE=$(cygpath -u "$GIT_CACHE")" >> "$GITHUB_ENV"
        echo "DNN_MODELS=$(cygpath -u "$DNN_MODELS")" >> "$GITHUB_ENV"
        echo "BINARIES_CACHE=$(cygpath -u "$BINARIES_CACHE")" >> "$GITHUB_ENV"
        echo "OPENCV_DOWNLOAD_PATH=$(cygpath -u "$BINARIES_CACHE")" >> "$GITHUB_ENV"

    - name: Print system info
      shell: pwsh
      run: |
        echo "=========================================="
        echo "===== BASIC OS & MACHINE INFO ====="
        echo "=========================================="
        Get-CimInstance Win32_OperatingSystem | Select-Object Caption, Version, OSArchitecture, BuildNumber, ServicePackMajorVersion | Format-List
        Get-CimInstance Win32_ComputerSystem | Select-Object Manufacturer, Model, SystemType, NumberOfProcessors, NumberOfLogicalProcessors, TotalPhysicalMemory | Format-List

        echo "=========================================="
        echo "===== CPU DETAILED INFO ====="
        echo "=========================================="
        Get-CimInstance Win32_Processor | Format-List *

        echo "--- Process & OS Architecture ---"
        echo "OS Arch        : $([System.Runtime.InteropServices.RuntimeInformation]::OSArchitecture)"
        echo "Process Arch   : $([System.Runtime.InteropServices.RuntimeInformation]::ProcessArchitecture)"
        echo "OS Description : $([System.Runtime.InteropServices.RuntimeInformation]::OSDescription)"
        echo "Framework      : $([System.Runtime.InteropServices.RuntimeInformation]::FrameworkDescription)"

        echo "=========================================="
        echo "===== ARM64 CPU FEATURE FLAGS ====="
        echo "=========================================="
        $armTypes = @(
          'System.Runtime.Intrinsics.Arm.ArmBase',
          'System.Runtime.Intrinsics.Arm.AdvSimd',
          'System.Runtime.Intrinsics.Arm.Aes',
          'System.Runtime.Intrinsics.Arm.Crc32',
          'System.Runtime.Intrinsics.Arm.Dp',
          'System.Runtime.Intrinsics.Arm.Rdm',
          'System.Runtime.Intrinsics.Arm.Sha1',
          'System.Runtime.Intrinsics.Arm.Sha256',
          'System.Runtime.Intrinsics.Arm.Sve'
        )
        foreach ($typeName in $armTypes) {
          try {
            $type = [System.Type]::GetType("$typeName, System.Private.CoreLib", $true)
            $supported = $type::IsSupported
            echo "$typeName supported : $supported"
          } catch {
            echo "$typeName : NOT AVAILABLE on this runtime (Exception: $_)"
          }
        }
        try {
          $t64 = [System.Type]::GetType('System.Runtime.Intrinsics.Arm.ArmBase+Arm64, System.Private.CoreLib', $true)
          echo "ArmBase.Arm64 supported : $($t64::IsSupported)"
        } catch { echo "ArmBase.Arm64 : NOT AVAILABLE" }
        try {
          $t64 = [System.Type]::GetType('System.Runtime.Intrinsics.Arm.AdvSimd+Arm64, System.Private.CoreLib', $true)
          echo "AdvSimd.Arm64 supported : $($t64::IsSupported)"
        } catch { echo "AdvSimd.Arm64 : NOT AVAILABLE" }
        try {
          $t64 = [System.Type]::GetType('System.Runtime.Intrinsics.Arm.Crc32+Arm64, System.Private.CoreLib', $true)
          echo "Crc32.Arm64 supported : $($t64::IsSupported)"
        } catch { echo "Crc32.Arm64 : NOT AVAILABLE" }

        echo "=========================================="
        echo "===== MEMORY DETAILS ====="
        echo "=========================================="
        $os = Get-CimInstance Win32_OperatingSystem
        echo "Total Physical RAM : $([math]::Round($os.TotalVisibleMemorySize/1MB, 2)) GB"
        echo "Free Physical RAM  : $([math]::Round($os.FreePhysicalMemory/1MB, 2)) GB"
        echo "Total Virtual Mem  : $([math]::Round($os.TotalVirtualMemorySize/1MB, 2)) GB"
        echo "Free Virtual Mem   : $([math]::Round($os.FreeVirtualMemory/1MB, 2)) GB"
        Get-CimInstance Win32_PhysicalMemory | Select-Object BankLabel, Capacity, Speed, MemoryType | Format-List

        echo "=========================================="
        echo "===== DISK INFO ====="
        echo "=========================================="
        Get-PSDrive -PSProvider FileSystem | Where-Object { $_.Used -ne $null } |
          Select-Object @{N='DeviceID';E={$_.Name+':'}},
                        @{N='Size(GB)';E={[math]::Round(($_.Used+$_.Free)/1GB,2)}},
                        @{N='Free(GB)';E={[math]::Round($_.Free/1GB,2)}},
                        @{N='FileSystem';E={(Get-CimInstance -Query "SELECT FileSystem FROM Win32_LogicalDisk WHERE DeviceID='$($_.Name):'").FileSystem}},
                        @{N='VolumeName';E={(Get-CimInstance -Query "SELECT VolumeName FROM Win32_LogicalDisk WHERE DeviceID='$($_.Name):'").VolumeName}} |
          Format-Table -AutoSize

        echo "=========================================="
        echo "===== FLOATING POINT BEHAVIOR ====="
        echo "=========================================="
        echo "1.0/3.0 = $([double]1.0/[double]3.0)"
        echo "Float epsilon : $([double]::Epsilon)"
        echo "Float MaxValue: $([double]::MaxValue)"

        echo "=========================================="
        echo "===== ENVIRONMENT VARIABLES ====="
        echo "=========================================="
        Get-ChildItem Env: | Sort-Object Name | Format-Table -AutoSize

        echo "=========================================="
        echo "===== VISUAL STUDIO / BUILD TOOLS ====="
        echo "=========================================="
        $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
        if (Test-Path $vsWhere) {
          & $vsWhere -all -format json | ConvertFrom-Json | ConvertTo-Json -Depth 5
        } else {
          echo "vswhere.exe not found"
        }

        echo "=========================================="
        echo "===== CMAKE INFO ====="
        echo "=========================================="
        cmake --version 2>&1 || echo "cmake not found"

        echo "=========================================="
        echo "===== PYTHON INFO ====="
        echo "=========================================="
        python --version 2>&1 || echo "python not found"
        python -c "import platform; print(platform.machine())" 2>&1 || true
        python -c "import platform; print(platform.processor())" 2>&1 || true

        echo "=========================================="
        echo "===== GIT INFO ====="
        echo "=========================================="
        git --version 2>&1 || echo "git not found"

        echo "=========================================="
        echo "===== NETWORK ====="
        echo "=========================================="
        Get-CimInstance Win32_NetworkAdapterConfiguration | Where-Object { $_.IPAddress -ne $null } |
          Select-Object Description, IPAddress, DefaultIPGateway | Format-List

        echo "=========================================="
        echo "===== RUNNING PROCESSES (Top 20) ====="
        echo "=========================================="
        Get-Process | Sort-Object CPU -Descending | Select-Object -First 20 Name, CPU, WorkingSet | Format-Table -AutoSize

        echo "=========================================="
        echo "===== TEMP / WORKSPACE DIRS ====="
        echo "=========================================="
        echo "TEMP             = $env:TEMP"
        echo "TMP              = $env:TMP"
        echo "GITHUB_WORKSPACE = $env:GITHUB_WORKSPACE"
        Get-ChildItem C:\ | Format-Table -AutoSize

    - name: Checkout workflow repository
      uses: actions/checkout@v4
      with:
        repository: opencv/ci-gha-workflow
        ref: "${{ github.repository == 'opencv/ci-gha-workflow' && github.ref || inputs.workflow_branch }}"

    - working-directory: '${{ github.workspace }}'
      shell: bash
      run: |
        ls -l
        export
        whoami
        id
        which bash
        echo "GIT_CACHE=$GIT_CACHE"
        echo "DNN_MODELS=$DNN_MODELS"
        echo "BINARIES_CACHE=$BINARIES_CACHE"
        echo "OPENCV_DOWNLOAD_PATH=$BINARIES_CACHE"

    - name: Checkout and merge OpenCV
      uses: ./checkout-and-merge
      with:
        target_branch: '${{ matrix.branch }}'
        author: '${{ github.event.pull_request.user.login }}'
        source_branch: "${{ github.event.repository.name == 'ci-gha-workflow' && '' || github.head_ref }}"
        gitcache: '${{ env.GIT_CACHE }}'
        workdir: '${{ github.workspace }}'

    - name: Update extra dnn models
      if: ${{ matrix.arch != 'arm64' }}
      timeout-minutes: 60
      working-directory: '${{ github.workspace }}'
      run: |
        python opencv_extra/testdata/dnn/download_models.py \
          --cleanup \
          --dst '${{ env.DNN_MODELS }}/dnn'
        echo "OPENCV_DNN_TEST_DATA_PATH=${{ env.DNN_MODELS }}" >> $GITHUB_ENV

    - if: ${{ github.event.repository.name != 'opencv_contrib' }}
      name: Configure and build OpenCV
      uses: ./configure-and-build
      with:
        workdir: '${{ github.workspace }}'
        builddir: 'build'
        generator: '${{ matrix.vs }}'
        options: '-A ${{ matrix.cmake_arch }} ${{ env.CMAKE_OPT }}'

    - name: Configure and build OpenCV with contrib
      uses: ./configure-and-build
      with:
        workdir: '${{ github.workspace }}'
        builddir: 'build-contrib'
        generator: '${{ matrix.vs }}'
        options: '-A ${{ matrix.cmake_arch }} -DCMAKE_BUILD_TYPE=Release -DOPENCV_EXTRA_MODULES_PATH=opencv_contrib/modules ${{ env.CMAKE_OPT }}'

    - name: Run OpenCV tests
      uses: ./run-tests
      env:
        OPENCV_TEST_DATA_PATH: '${{ github.workspace }}/opencv_extra/testdata'
        OPENCV_TEST_REQUIRE_DATA: ${{ matrix.arch == 'arm64' && '0' || '1' }}
        OPENCV_TEST_CHECK_OPTIONAL_DATA: ${{ matrix.arch == 'arm64' && '0' || '1' }}
        PYTHONPATH: '${{ github.workspace }}/${{ env.MAIN_BUILD_DIR }}/python_loader:$PYTHONPATH'
        OPENCV_OPENCL_RUNTIME: 'disabled'
      with:
        workdir: '${{ github.workspace }}'
        builddir: '${{ env.MAIN_BUILD_DIR }}'
        logdir: '${{ github.workspace }}'
        plan: "test-plan-win-${{ matrix.branch }}.json"
        suite: "[ ${{ (github.event.repository.name == 'opencv_contrib') && '''contrib'''  || '''main''' }} ]"
        enable_python: "false"
        enable_java: "false"
        filter: "[ 'windows-common' ]"
        suffix: '${{ matrix.arch }}_${{ matrix.branch }}'
        timeout: 15

    - if: ${{ always() && env.WARNINGS == '1' }}
      name: Warnings check
      run: |
        echo "::error Warnings have been found!"
        exit 1
