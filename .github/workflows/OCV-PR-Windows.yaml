name: OCV PR Windows

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/OCV-PR-Windows.yaml'
      - 'checkout-and-merge/*'
      - 'configure-and-build/*'
      - 'run-tests/*'
      - 'scripts/runner.py'
      - 'scripts/test-plan.json'
  workflow_call:
    inputs:
      workflow_branch:
        description: "Branch for ci-gha-workflow repository"
        default: "main"
        required: false
        type: string

concurrency:
  group: OCV-PR-Windows-${{ github.ref }}
  cancel-in-progress: true

jobs:

  branch_eval:
    runs-on: ubuntu-24.04
    outputs:
      branches: ${{ steps.determine-branches.outputs.branches }}
    steps:
        - id: determine-branches
          shell: bash
          run: |
            # MODIFICATION: hardcoded to 4.x only
            echo "branches=[ '4.x' ]" >> "$GITHUB_OUTPUT"

  Windows:
    runs-on: self-hosted
    needs:
      - branch_eval
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        arch: [ arm64 ]
        config: [ base ]
        include:
          - arch: arm64
            config: base
            vs: 'Visual Studio 17 2022'
            cmake_arch: ARM64
            no_opencl: true
        branch: ${{ fromJSON(needs.branch_eval.outputs.branches) }}
    defaults:
      run:
        shell: bash
    env:
      CMAKE_OPT: >-
        -DCL_Z_OPTION=/Z7
        -DBUILD_EXAMPLES=ON
        -DOPENCV_ENABLE_NONFREE=ON
        -DCMAKE_BUILD_TYPE=Release
        ${{ matrix.no_opencl && '-DWITH_OPENCL=OFF' || '' }}
        ${{ matrix.arch == 'x86' && '-DBUILD_opencv_python3=OFF' || '' }}
      MAIN_BUILD_DIR: "${{ (github.event.repository.name != 'opencv_contrib') && 'build' || 'build-contrib' }}"
      OPENCV_FOR_THREADS_NUM: 4
      CMAKE_BUILD_PARALLEL_LEVEL: 4

    steps:

    # Sets CPU affinity on the Actions Runner worker process itself (Runner.Worker.exe).
    # Because every step and child process is spawned by this worker, they all inherit
    # the affinity mask — this is true OS-level enforcement, not per-step enforcement.
    # Mask 0xF = binary 1111 = cores 0,1,2,3 only (4 cores).
    - name: Set runner CPU affinity to 4 cores (OS-level)
      shell: powershell
      run: |
        $mask = 0xF  # 0xF = 1111 in binary = cores 0-3 only
        
        # Target the Runner.Worker.exe process — this is the parent of all steps
        $worker = Get-Process -Name "Runner.Worker" -ErrorAction SilentlyContinue
        if ($worker) {
          foreach ($proc in $worker) {
            $proc.ProcessorAffinity = [IntPtr]$mask
            Write-Host "Set affinity on Runner.Worker.exe PID $($proc.Id) to mask $mask (cores 0-3)"
          }
        } else {
          Write-Warning "Runner.Worker process not found — falling back to current process tree"
        }
        
        # Also set on the current PowerShell process and its parent chain
        # to cover the case where process name differs across runner versions
        $current = Get-Process -Id $PID
        $current.ProcessorAffinity = [IntPtr]$mask

        # Walk up the parent chain and set affinity on all ancestor processes
        # so no parent process can re-spawn children on unrestricted cores
        $id = $PID
        while ($true) {
          try {
            $parent = (Get-CimInstance Win32_Process -Filter "ProcessId=$id").ParentProcessId
            if (-not $parent -or $parent -eq 0 -or $parent -eq $id) { break }
            $parentProc = Get-Process -Id $parent -ErrorAction SilentlyContinue
            if (-not $parentProc) { break }
            # Stop walking at system-level processes (PID 4 = System, PID 0 = Idle)
            if ($parent -le 4) { break }
            $parentProc.ProcessorAffinity = [IntPtr]$mask
            Write-Host "Set affinity on $($parentProc.Name) PID $parent"
            $id = $parent
          } catch {
            break
          }
        }
        
        Write-Host "Affinity enforcement complete. All runner processes restricted to cores 0-3."

    - name: Propagate environment
      run: |
        echo "GIT_CACHE=$(cygpath -u "$GIT_CACHE")" >> "$GITHUB_ENV"
        echo "DNN_MODELS=$(cygpath -u "$DNN_MODELS")" >> "$GITHUB_ENV"
        echo "BINARIES_CACHE=$(cygpath -u "$BINARIES_CACHE")" >> "$GITHUB_ENV"
        echo "OPENCV_DOWNLOAD_PATH=$(cygpath -u "$BINARIES_CACHE")" >> "$GITHUB_ENV"

    - name: Checkout workflow repository
      uses: actions/checkout@v4
      with:
        repository: opencv/ci-gha-workflow
        ref: "${{ github.repository == 'opencv/ci-gha-workflow' && github.ref || inputs.workflow_branch }}"

    - working-directory: '${{ github.workspace }}'
      shell: bash
      run: |
        ls -l
        export
        whoami
        id
        which bash
        echo "GIT_CACHE=$GIT_CACHE"
        echo "DNN_MODELS=$DNN_MODELS"
        echo "BINARIES_CACHE=$BINARIES_CACHE"
        echo "OPENCV_DOWNLOAD_PATH=$BINARIES_CACHE"

    - name: Checkout and merge OpenCV
      uses: ./checkout-and-merge
      with:
        target_branch: '${{ matrix.branch }}'
        author: '${{ github.event.pull_request.user.login }}'
        source_branch: "${{ github.event.repository.name == 'ci-gha-workflow' && '' || github.head_ref }}"
        gitcache: '${{ env.GIT_CACHE }}'
        workdir: '${{ github.workspace }}'

    - name: Update extra dnn models
      if: ${{ matrix.arch != 'arm64' }}
      timeout-minutes: 60
      working-directory: '${{ github.workspace }}'
      run: |
        python opencv_extra/testdata/dnn/download_models.py \
          --cleanup \
          --dst '${{ env.DNN_MODELS }}/dnn'
        echo "OPENCV_DNN_TEST_DATA_PATH=${{ env.DNN_MODELS }}" >> $GITHUB_ENV

    - if: ${{ github.event.repository.name != 'opencv_contrib' }}
      name: Configure and build OpenCV
      uses: ./configure-and-build
      with:
        workdir: '${{ github.workspace }}'
        builddir: 'build'
        generator: '${{ matrix.vs }}'
        options: '-A ${{ matrix.cmake_arch }} ${{ env.CMAKE_OPT }}'

    - name: Configure and build OpenCV with contrib
      uses: ./configure-and-build
      with:
        workdir: '${{ github.workspace }}'
        builddir: 'build-contrib'
        generator: '${{ matrix.vs }}'
        options: '-A ${{ matrix.cmake_arch }} -DCMAKE_BUILD_TYPE=Release -DOPENCV_EXTRA_MODULES_PATH=opencv_contrib/modules ${{ env.CMAKE_OPT }}'

    - name: Run OpenCV tests
      uses: ./run-tests
      env:
        OPENCV_TEST_DATA_PATH: '${{ github.workspace }}/opencv_extra/testdata'
        OPENCV_TEST_REQUIRE_DATA: ${{ matrix.arch == 'arm64' && '0' || '1' }}
        OPENCV_TEST_CHECK_OPTIONAL_DATA: ${{ matrix.arch == 'arm64' && '0' || '1' }}
        PYTHONPATH: '${{ github.workspace }}/${{ env.MAIN_BUILD_DIR }}/python_loader:$PYTHONPATH'
        OPENCV_OPENCL_RUNTIME: 'disabled'
      with:
        workdir: '${{ github.workspace }}'
        builddir: '${{ env.MAIN_BUILD_DIR }}'
        logdir: '${{ github.workspace }}'
        plan: "test-plan-win-${{ matrix.branch }}.json"
        suite: "[ ${{ (github.event.repository.name == 'opencv_contrib') && '''contrib''' || '''main''' }} ]"
        enable_python: "false"
        enable_java: "false"
        filter: "[ 'windows-common' ]"
        suffix: '${{ matrix.arch }}_${{ matrix.branch }}'
        timeout: 15

    - if: ${{ always() && env.WARNINGS == '1' }}
      name: Warnings check
      run: |
        echo "::error Warnings have been found!"
        exit 1
